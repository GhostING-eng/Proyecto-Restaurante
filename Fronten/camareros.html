<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Camarero</title>
    <link rel="stylesheet" href="camarero.css">
</head>

<body>

<header>
    <h1>Panel de Camarero</h1>
</header>

<main>

    <div class="formulario">

        <h2>➕ Nuevo pedido</h2>

        <input type="text" id="cliente" placeholder="Nombre del cliente">

        <textarea id="pedido" placeholder="Escribe el pedido del cliente..."></textarea>

        <button onclick="agregarPedido()">Agregar pedido</button>

    </div>


    <h2> Lista de pedidos</h2>

    <ul id="listaPedidos"></ul>

</main>

<script src="camarero.js"></script>

</body>
